# Local dev stack — PostgreSQL only.
# DC-API runs as a native Go binary (not in Docker) so you get fast rebuilds
# and can attach a debugger. Harvester and Rancher are accessed directly from
# your Mac over the network.
#
# Usage:
#   docker compose up -d          # start postgres in background
#   docker compose down           # stop and remove containers (data persists in volume)
#   docker compose down -v        # stop AND wipe the database volume (fresh slate)

services:
  postgres:
    image: postgres:16-alpine
    container_name: dc-postgres
    environment:
      POSTGRES_USER: dc_api
      POSTGRES_PASSWORD: dc_dev_password
      POSTGRES_DB: dc_api
    ports:
      # Host port is overridable via DC_PG_PORT (default 5432) so a local-stack
      # dev DB can avoid colliding with a system Postgres already on 5432.
      - "${DC_PG_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dc_api"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
    driver: local
